<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxary Hotel 5 Star</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

nav {
    background: #333;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
}

nav a {
    color: white;
    text-decoration: none;
    margin: 0 10px;
}


.hero {
    height: 90vh;
    background: url('https://static.wikia.nocookie.net/hoteltransylvania/images/4/48/Castle_Night.jpg/revision/latest?cb=20120923001505') no-repeat center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    text-align: center;
}

.hero h1 {
    font-size: 50px;
}

/* BOOKING FORM */
.booking {
    background: #f4f4f4;
    padding: 30px;
    text-align: center;
}

.booking input, .booking select {
    padding: 10px;
    margin: 10px;
    width: 200px;
}

.booking button {
    padding: 10px 20px;
    background: #333;
    color: white;
    border: none;
}

/* ROOMS */
.rooms {
    padding: 40px;
    text-align: center;
}

.room-card {
    display: inline-block;
    width: 250px;
    margin: 15px;
    border: 1px solid #ddd;
    padding: 10px;
}

.room-card img {
    width: 100%;
}

/* FOOTER */
footer {
    background: #333;
    color: white;
    text-align: center;
    padding: 10px;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav>
    <div><strong>HotelLux</strong></div>
    <div>
        <a href="#">Home</a>
        <a href="#">Rooms</a>
        <a href="#">Booking</a>
        <a href="#">Contact</a>
    </div>
</nav>

<!-- HERO -->
<div class="hero">
    <div class="hero-content">
        <h1>Welcome to THE LUXUARY HOTEL 5 STAR</h1>
        <p>Experience spring that you've never seen.</p>
    </div>
</div>

<!-- BOOKING FORM -->
<div class="booking">
    <h2>Book a Room</h2>
    <form>
        <input type="text" placeholder="Full Name" required>
        <input type="date" required>
        <input type="date" required>
        <select>
            <option>1 Guest</option>
            <option>2 Guests</option>
            <option>3 Guests</option>
        </select>
        <br>
        <button type="submit">Check Availability</button>
    </form>
</div>

<!-- ROOMS -->
<div class="rooms">
    <h2>Our Rooms</h2>

    <div class="room-card">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ_zs7MAKca1Ye0a484X4IT0ZT5xt95q9Oe5w&s">
        <h3>Deluxe Room</h3>
        <p>$120 / night</p>
    </div>

    <div class="room-card">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSqMt4xYhDOSFElOxg2dBU8CSAVgbuZoX0lOg&s">
        <h3>Suite Room</h3>
        <p>$200 / night</p>
    </div>

    <div class="room-card">
        <img src="https://i.pinimg.com/736x/82/41/0d/82410d4c63371b01d1e71182ec07cde8.jpg">
        <h3>Standard Room</h3>
        <p>$80 / night</p>
    </div>

</div>

<!-- FOOTER -->
<footer>
    <p>&copy; 2026-2069 Hotel na hindi para sayo(aray koi!!!!)</p>
</footer>

</body>
</html>
